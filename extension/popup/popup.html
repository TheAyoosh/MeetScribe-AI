<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeetScribe AI</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <div class="pop-header">
      <div class="pop-logo">
        <div class="pop-logo-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="white" stroke-width="1.5" opacity="0.5"/>
            <path d="M8 12l2 2 4-4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span>MeetScribe AI</span>
      </div>
      <div class="pop-version">v1.0</div>
    </div>

    <!-- Status Card -->
    <div class="pop-status-card" id="status-card">
      <div class="pop-status-icon" id="status-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z" stroke="currentColor" stroke-width="1.5"/>
          <path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="pop-status-info">
        <div class="pop-status-title" id="status-title">Ready</div>
        <div class="pop-status-sub" id="status-sub">Open Google Meet or Zoom to begin</div>
      </div>
      <div class="pop-status-dot" id="status-dot"></div>
    </div>

    <!-- Quick Actions -->
    <div class="pop-actions">
      <button class="pop-action-btn" id="open-sidebar-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/>
          <path d="M15 3v18" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        Open Sidebar
      </button>
      <button class="pop-action-btn" id="open-dashboard-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="7" height="7" rx="1" fill="currentColor" opacity="0.7"/>
          <rect x="14" y="3" width="7" height="7" rx="1" fill="currentColor" opacity="0.7"/>
          <rect x="3" y="14" width="7" height="7" rx="1" fill="currentColor" opacity="0.4"/>
          <rect x="14" y="14" width="7" height="7" rx="1" fill="currentColor" opacity="0.7"/>
        </svg>
        Dashboard
      </button>
    </div>

    <!-- Recent Meetings -->
    <div class="pop-section">
      <div class="pop-section-title">Recent Meetings</div>
      <div id="recent-meetings">
        <div class="pop-empty">No meetings recorded yet</div>
      </div>
    </div>

    <!-- Models Status -->
    <div class="pop-models">
      <div class="pop-model-item" id="hf-status">
        <div class="pop-model-dot not-configured"></div>
        <span>Whisper / Parakeet</span>
        <span class="pop-model-state">Not configured</span>
      </div>
      <div class="pop-model-item" id="gemini-status">
        <div class="pop-model-dot not-configured"></div>
        <span>Gemini Flash</span>
        <span class="pop-model-state">Not configured</span>
      </div>
    </div>

    <!-- Footer -->
    <div class="pop-footer">
      <button class="pop-text-btn" id="settings-link"> Settings</button>
      <button class="pop-text-btn" id="help-link">? Help</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
